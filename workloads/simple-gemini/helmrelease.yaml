apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: simple-gemini
  namespace: simple-gemini
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts
      sourceRef:
        kind: GitRepository
        name: simple-gemini-repo
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

