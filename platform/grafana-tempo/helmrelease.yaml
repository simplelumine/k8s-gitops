apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-tempo
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: tempo
      version: "2.0.x"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: monitoring
  values:
    tempo:
      retention: 72h
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      # Only keep OTLP receivers (gRPC :4317 → Open WebUI, HTTP :4318 → LiteLLM)
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    # Stateless deployment — traces are ephemeral, allows floating across nodes
    persistence:
      enabled: false
