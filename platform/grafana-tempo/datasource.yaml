apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-tempo
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo-datasource
        url: http://grafana-tempo.monitoring.svc:3200
        access: proxy
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: victoria-logs-datasource
            tags:
              - key: service.name
          tracesToMetrics:
            datasourceUid: prometheus
            tags:
              - key: service.name
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
