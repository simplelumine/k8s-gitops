apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  values:
    deployment:
      replicas: 2

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik

    nodeSelector:
      svccontroller.k3s.cattle.io/enablelb: "true"

    # CP node removed from traffic path - Traefik only runs on pro nodes
    # tolerations for control-plane intentionally omitted

    service:
      type: LoadBalancer
