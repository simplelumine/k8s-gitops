apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  values:
    fullnameOverride: "victoria-metrics"

    grafana:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - monitor.simplelumine.dev
        tls:
          - secretName: grafana-tls
            hosts:
              - monitor.simplelumine.dev

      plugins:
        - victoriametrics-logs-datasource
        - victoriametrics-datasource

      # service:
      #   annotations:
      #     tailscale.com/expose: "true"
      #     tailscale.com/hostname: "victoria-metrics"

      # Inject secret values as Environment Variables
      envFromSecret: victoria-metrics-auth

      # Configure Grafana.ini to use Env Vars
      grafana.ini:
        server:
          domain: monitor.simplelumine.dev
          root_url: https://monitor.simplelumine.dev
          serve_from_sub_path: false

        auth.github:
          enabled: true
          allow_sign_up: true
          # Read from Env Vars injected by envFromSecret
          client_id: ${GF_AUTH_GITHUB_CLIENT_ID}
          client_secret: ${GF_AUTH_GITHUB_CLIENT_SECRET}
          scopes: user:email,read:org
          auth_url: https://github.com/login/oauth/authorize
          token_url: https://github.com/login/oauth/access_token
          api_url: https://api.github.com/user
          # Replace with your GitHub Organization
          allowed_organizations: lumine-duality
          # Map GitHub Teams to Grafana Roles
          role_attribute_path: "contains(groups[*], '@lumine-duality/admins') && 'Admin' || 'Viewer'"

    # Prefer lite tier nodes for monitoring components
    vmsingle:
      spec:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/tier
                    operator: In
                    values:
                      - lite

    vmagent:
      spec:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/tier
                    operator: In
                    values:
                      - lite

    vmalert:
      spec:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/tier
                    operator: In
                    values:
                      - lite
