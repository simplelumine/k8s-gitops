apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: litellm
spec:
  values:
    # --- Use custom ConfigMap (standard Helm approach) ---
    proxyConfigMap:
      create: false
      name: litellm-config
      key: config.yaml

    # --- Infrastructure Configuration ---
    db:
      useExisting: true
      endpoint: postgres-rw.postgres.svc.cluster.local
      database: litellm
      secret:
        name: litellm-db-secret
        usernameKey: username
        passwordKey: password
      deployStandalone: false

    redis:
      enabled: false

    # --- Environment Variables ---
    # Load ALL keys from secret (official Helm approach)
    environmentSecrets:
      - litellm-secret

    extraEnvVars:
      - name: REDIS_HOST
        value: "redis-master.redis.svc.cluster.local"
      - name: REDIS_PORT
        value: "6379"
      # --- OpenTelemetry Tracing (-> Grafana Tempo) ---
      - name: OTEL_EXPORTER
        value: "otlp_http"
      - name: OTEL_ENDPOINT
        value: "http://grafana-tempo.monitoring.svc:4318"

    service:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "litellm"

    # --- Ingress ---
    ingress:
      enabled: true
      className: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: api.simplelumine.dev
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: litellm-tls
          hosts:
            - api.simplelumine.dev

    # Schedule near the Postgres primary (Leader) for lowest latency
    affinity:
      podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  cnpg.io/cluster: postgres
                  cnpg.io/instanceRole: primary
              topologyKey: kubernetes.io/hostname
