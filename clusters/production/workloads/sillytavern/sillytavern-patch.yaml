apiVersion: apps/v1
kind: Deployment
metadata:
  name: sillytavern
  namespace: sillytavern
spec:
  template:
    spec:
      priorityClassName: high
      containers:
        - name: sillytavern-container
          resources:
            requests:
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "3Gi"
