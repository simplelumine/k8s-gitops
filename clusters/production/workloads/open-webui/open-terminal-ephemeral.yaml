apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal-ephemeral
  namespace: open-webui
  labels:
    app: open-terminal-ephemeral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-terminal-ephemeral
  template:
    metadata:
      labels:
        app: open-terminal-ephemeral
    spec:
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPEN_TERMINAL_MULTI_USER
              value: "true"
            - name: OPEN_TERMINAL_API_KEY
              value: "open-terminal-internal"
          volumeMounts:
            - name: workspace-data
              mountPath: /home
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: workspace-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: open-terminal-ephemeral-service
  namespace: open-webui
spec:
  type: ClusterIP
  selector:
    app: open-terminal-ephemeral
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
