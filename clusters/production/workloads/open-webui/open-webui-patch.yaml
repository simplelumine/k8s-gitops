apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 1h
  values:
    websocket:
      enabled: true
      # Using external Redis (defined by 'url'), so internal redis is disabled but manager is set to redis
      manager: redis
      url: redis://redis-master.redis.svc.cluster.local:6379/0
      redis:
        enabled: false
    pipelines:
      enabled: false
    tika:
      enabled: true
    persistence:
      enabled: true
      provider: s3

    service:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "open-webui"

    ingress:
      enabled: true
      class: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: chat.simplelumine.dev
      tls: true
      existingSecret: open-webui-tls

    commonEnvVars:
      - name: OFFLINE_MODE
        value: "true"
      - name: ENABLE_OPENAI_API
        value: "true"
      - name: ENABLE_OLLAMA_API
        value: "false"
      - name: ENABLE_ADMIN_EXPORT
        value: "false"
      - name: ENABLE_ADMIN_CHAT_ACCESS
        value: "false"
      - name: BYPASS_ADMIN_ACCESS_CONTROL
        value: "false"
      - name: CHAT_STREAM_RESPONSE_CHUNK_MAX_BUFFER_SIZE
        value: "10485760"
      - name: REPLACE_IMAGE_URLS_IN_CHAT_RESPONSE
        value: "true"

    extraEnvVars:
      # S3 Configuration from external secret
      - name: S3_ENDPOINT_URL
        valueFrom:
          secretKeyRef:
            name: open-webui-secret
            key: s3-endpoint-url
      - name: S3_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: open-webui-secret
            key: s3-access-key-id
      - name: S3_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: open-webui-secret
            key: s3-secret-access-key
      - name: S3_BUCKET_NAME
        value: "open-webui-data"
      - name: S3_REGION_NAME
        value: "auto"
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: open-webui-db-secret
            key: DATABASE_URL
      # Qdrant Configuration
      - name: VECTOR_DB
        value: "qdrant"
      - name: QDRANT_URI
        value: "http://qdrant.qdrant.svc.cluster.local:6333"
      - name: QDRANT_API_KEY
        valueFrom:
          secretKeyRef:
            name: open-webui-secret
            key: qdrant-api-key
      # --- OpenTelemetry Tracing (-> Grafana Tempo) ---
      - name: ENABLE_OTEL
        value: "true"
      - name: OTEL_SERVICE_NAME
        value: "open-webui"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "http://grafana-tempo.monitoring.svc:4317"
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: "grpc"

    # Schedule near the Postgres primary (Leader) for lowest latency
    # and prefer pro tier nodes
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/tier
                  operator: In
                  values:
                    - pro
      podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  cnpg.io/cluster: postgres
                  cnpg.io/instanceRole: primary
              topologyKey: topology.kubernetes.io/region
