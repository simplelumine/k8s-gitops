# Platform administrators (e.g. Coder Provisioner) require cluster-admin privileges
# to dynamically provision namespaces, deploy complex isolated resources like vcluster,
# and manage the lifecycle of sandboxed environments.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coder-workspace-provisioner-binding
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder # The namespace where Coder is installed
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
