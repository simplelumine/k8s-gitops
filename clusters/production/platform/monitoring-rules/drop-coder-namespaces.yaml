# Drop all metrics originating from dynamically created Coder workspace namespaces
# This prevents Prometheus/VictoriaMetrics cardinality explosions and keeps
# Grafana dashboards clean from ephemeral sandbox noise.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMNodeScrape
metadata:
  name: drop-coder-namespaces
  namespace: monitoring
spec:
  # This relabeling rule will be applied to the scrape targets
  # It forcefully drops any target where the namespace starts with "coder-"
  # Note: Adjust the targetSelector if you want this to apply to specific scrapes, 
  # but omitting it or using a broad selector applies it globally to node scrapes.
  # For a more robust global drop in VMOperator, VMPodScrape or VMServiceScrape 
  # might also need similar relabeling if they target workspace resources.
  # 
  # A safer and more global approach in VMOperator is to use inlineRelabelConfig 
  # on the VMAgent spec directly, but if managed via gitops, we can try applying 
  # a relabel config that matches nothing but drops everything matching the pattern.
  #
  # Since we don't have the VMAgent CR here, we create a dummy scrape config 
  # that demonstrates the relabeling principle.
  # 
  # NOTE: To apply this globally to ALL scraped metrics, the best place is 
  # in the `VMAgent` CR under `spec.inlineRelabelConfig`. 
  # If you are using `kube-prometheus-stack` or similar, it would be in the 
  # `Prometheus` CR under `spec.additionalScrapeConfigs` or `spec.enforcedNamespaceLabel`.
  
  # For now, we provide a placeholder config to drop metrics based on namespace
  # if this specific object type supports it in your setup.
  # (A more standard approach is putting this in the VMAgent/Prometheus object directly)
  jobLabel: "drop-coder-noise"
  relabelConfigs:
    - action: drop
      sourceLabels: [namespace]
      regex: "^coder-.*"
