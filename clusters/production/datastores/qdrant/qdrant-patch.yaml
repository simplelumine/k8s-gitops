apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  values:
    # --- Single Node Configuration ---
    # Single node with S3 backup is the most pragmatic setup for homelab.
    # If HA is needed later, use the Qdrant Migration Tool to move to a cluster.
    replicaCount: 1

    priorityClassName: high

    config:
      cluster:
        enabled: false
      storage:
        snapshots_config:
          snapshots_storage: s3
          s3_config:
            bucket: prod-qd-backups
            region: auto
            endpoint_url: ${R2_ENDPOINT_URL}

    # --- S3 Credentials via Environment Variables ---
    # Qdrant supports QDRANT__ prefixed env vars to override config values
    env:
      - name: QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: qdrant-secret
            key: r2-access-key-id
      - name: QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: qdrant-secret
            key: r2-secret-access-key

    # --- Security ---
    apiKey:
      valueFrom:
        secretKeyRef:
          name: qdrant-secret
          key: api-key

    # --- Service ---
    service:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "qdrant"

    # --- Ingress ---
    ingress:
      enabled: false

    # Prefer pro tier nodes for Qdrant (vector DB for RAG)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: tier
                  operator: In
                  values:
                    - pro
