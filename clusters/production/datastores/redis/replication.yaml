apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis
  namespace: redis
spec:
  clusterSize: 2 # 1 master + 1 replica
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  sentinel:
    size: 3
    image: quay.io/opstree/redis-sentinel:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 20m
        memory: 16Mi
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0

  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi

  # Prefer pro/ultra tier nodes for Redis (core cache layer)
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/tier
                operator: In
                values:
                  - pro
                  - ultra
        - weight: 20
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/region
                operator: In
                values:
                  - sfo