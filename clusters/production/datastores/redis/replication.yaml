apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis
  namespace: redis
spec:
  clusterSize: 2 # 1 master + 1 replica
  priorityClassName: high
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  sentinel:
    size: 3
    image: quay.io/opstree/redis-sentinel:v7.4.8
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 20m
        memory: 16Mi
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.82.0

  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi

  # Prefer pro tier nodes for Redis (core cache layer)
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: tier
                operator: In
                values:
                  - pro
