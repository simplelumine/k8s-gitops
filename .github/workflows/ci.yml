name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Kustomize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Setup Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Build and Validate Production Cluster
        run: kustomize build clusters/production | kubeconform -summary -ignore-missing-schemas
